name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - run: cargo clippy -- -D warnings
      - run: cargo test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU builds
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nmem-linux-x86_64
            features: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nmem-macos-arm64
            features: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nmem-windows-x86_64
            features: ""
          # GPU builds (Linux only)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nmem-linux-x86_64-cuda
            features: cuda
            container: nvidia/cuda:12.8.1-devel-ubuntu24.04
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nmem-linux-x86_64-rocm
            features: rocm
            container: rocm/dev-ubuntu-24.04:6.4-complete
          # GPU builds (Windows)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nmem-windows-x86_64-cuda
            features: cuda
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (container)
        if: matrix.container
        env:
          CARGO_HOME: /root/.cargo
          RUSTUP_HOME: /root/.rustup
        run: |
          apt-get update && apt-get install -y curl cmake build-essential pkg-config libssl-dev libclang-dev git
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update && apt-get install -y gh
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"
          echo "CARGO_HOME=/root/.cargo" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=/root/.rustup" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ !matrix.container }}
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.container }}
        with:
          key: ${{ matrix.artifact }}

      - name: Install cmake (Linux, no container)
        if: runner.os == 'Linux' && !matrix.container
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install openssl:x64-windows-static-md
          echo "OPENSSL_DIR=C:\vcpkg\packages\openssl_x64-windows-static-md" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: Install LLVM (Windows CUDA)
        if: matrix.features == 'cuda' && runner.os == 'Windows'
        run: choco install llvm --no-progress -y

      - name: Install CUDA toolkit (Windows)
        if: matrix.features == 'cuda' && runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.34
        with:
          cuda: '12.4.0'
          method: 'network'
          sub-packages: '["nvcc", "cublas", "cublas_dev", "cudart"]'

      - name: Configure CUDA linker env (Windows)
        if: matrix.features == 'cuda' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $cudaLib = "$env:CUDA_PATH\lib\x64"
          $existing = if ($env:LIB) { ";$env:LIB" } else { "" }
          echo "LIB=$cudaLib$existing" >> $env:GITHUB_ENV
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Set up MSVC dev env (Windows CUDA)
        if: matrix.features == 'cuda' && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure ROCm linker
        if: matrix.features == 'rocm'
        run: |
          mkdir -p .cargo
          printf '[target.x86_64-unknown-linux-gnu]\nlinker = "gcc"\n' > .cargo/config.toml

      - name: Build release
        env:
          CMAKE_POSITION_INDEPENDENT_CODE: ${{ (matrix.features == 'rocm' && 'ON') || '' }}
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features && format('--features {0}', matrix.features) }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/nmem ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/nmem.exe ${{ matrix.artifact }}.exe

      - name: Upload release asset (Unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ${{ matrix.artifact }} --clobber --repo ${{ github.repository }}

      - name: Upload release asset (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ${{ matrix.artifact }}.exe --clobber --repo ${{ github.repository }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            NOTES="Initial release"
          else
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD)
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            --verify-tag
